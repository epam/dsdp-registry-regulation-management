{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "registry-regulation-management.name" . }}-{{ .Release.Namespace }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "registry-regulation-management.labels" . | nindent 4 }}
spec:
  endpoints:
    - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
      interval: {{ .Values.serviceMonitor.interval }}
      path: {{ .Values.serviceMonitor.scrapePath }}
      scheme: http
      targetPort: {{ .Values.service.port }}
    {{- if .Values.serviceMonitor.kiali.enabled }}
    - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
      interval: {{ .Values.serviceMonitor.kiali.interval }}
      path: {{ .Values.serviceMonitor.kiali.scrapePath }}
      scheme: http
      targetPort: {{ .Values.serviceMonitor.kiali.port }}
    {{- end }}
  jobLabel: {{ include "registry-regulation-management.name" . }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  selector:
    matchLabels:
      {{- include "registry-regulation-management.selectorLabels" . | nindent 6 }}
{{- end }}

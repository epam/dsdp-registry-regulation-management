{{- if .Values.serviceAccount.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "registry-regulation-management.name" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "registry-regulation-management.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "registry-regulation-management.name" . }}
{{- end }}
